<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#d5c1a3" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Jimmykub</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32x32.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Setup screen -->
  <section id="setup-screen" class="screen active">
    <img class="page-joker" src="avatars/joker.png?v=2" alt="Joker" />

    <div class="block">
      <h2>Seat order</h2>
      <div id="seat-circle" class="seat-circle"></div>
      <div id="bench" class="bench" hidden></div>
    </div>

    <div class="block">
      <h2>First player</h2>
      <div id="first-picker" class="first-picker"></div>
    </div>

    <div class="block">
      <h2>Turn length (seconds)</h2>
      <div id="duration-presets" class="preset-row">
        <button type="button" class="preset" data-seconds="60">60</button>
        <button type="button" class="preset active" data-seconds="90">90</button>
        <input id="duration-custom" class="preset-input" type="number" min="1" max="600" step="1" inputmode="numeric" enterkeyhint="done" placeholder="Custom" aria-label="Custom seconds" />
      </div>
    </div>

    <button id="start-btn" type="button" class="primary-btn" disabled>Start</button>
  </section>

  <!-- Timer screen -->
  <section id="timer-screen" class="screen">
    <button id="back-btn" type="button" class="back-btn" aria-label="Back to setup">‹</button>

    <div id="timer-stage" class="timer-stage">
      <div class="current-player">
        <img id="current-avatar" class="avatar-large" alt="" />
        <div id="current-name" class="current-name"></div>
      </div>

      <div id="time-display" class="time-display">0:00</div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
